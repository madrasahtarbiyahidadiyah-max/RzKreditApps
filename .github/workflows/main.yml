name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. UPGRADE ke JDK 21 (Syarat mutlak untuk menjalankan Gradle 9.x)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Create .env file
      run: cp .env.example .env

    # 2. UPGRADE versi Gradle dari 8.7 menjadi 9.3.1 sesuai permintaan log
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    - name: Build Application
      run: gradle assembleDebug
