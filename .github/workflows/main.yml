name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create .env file
      run: cp .env.example .env

    # Menyuruh server GitHub mengunduh dan memasang mesin Gradle v8.7 secara mandiri
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    # Merakit aplikasi menggunakan perintah 'gradle' murni (tanpa gradlew)
    - name: Build Application
      run: gradle assembleDebug
